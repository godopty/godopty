name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always
  GDE_BIN: godot/bin

jobs:
  # ── Build GDExtension per platform ───────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build GDExtension (release)
        run: cargo build -p godopty-gdext --release

      - name: Package
        run: |
          mkdir -p release
          cp target/release/libgodopty_gdext.so release/libgodopty_gdext.linux.x86_64.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: godopty-linux-x86_64
          path: release/

  build-macos:
    strategy:
      matrix:
        target:
          - runner: macos-latest
            arch: arm64
          - runner: macos-13
            arch: x86_64
    runs-on: ${{ matrix.target.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build GDExtension (release)
        run: cargo build -p godopty-gdext --release

      - name: Package
        run: |
          mkdir -p release
          cp target/release/libgodopty_gdext.dylib release/libgodopty_gdext.macos.${{ matrix.target.arch }}.dylib

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: godopty-macos-${{ matrix.target.arch }}
          path: release/

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build GDExtension (release)
        run: cargo build -p godopty-gdext --release

      - name: Package
        run: |
          mkdir release
          copy target\release\godopty_gdext.dll release\godopty_gdext.windows.x86_64.dll

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: godopty-windows-x86_64
          path: release/

  # ── Export standalone app + create GitHub Release ─────────────────────
  export-release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4


      - name: Install Godot headless
        run: |
          sudo apt-get update -y && sudo apt-get install -y wget unzip
          wget -q https://github.com/godotengine/godot-builds/releases/download/4.7-stable/Godot_v4.7-stable_linux.x86_64.zip
          unzip Godot_v4.7-stable_linux.x86_64.zip
          chmod +x Godot_v4.7-stable_linux.x86_64
          sudo mv Godot_v4.7-stable_linux.x86_64 /usr/local/bin/godot
      - name: Download GDExtension artifacts
        uses: actions/download-artifact@v4
        with:
          path: gdext-artifacts

      - name: Stage GDExtension binaries into godot/bin/
        run: |
          mkdir -p godot/bin
          find gdext-artifacts -type f \( -name '*.so' -o -name '*.dylib' -o -name '*.dll' \) | while read f; do
            cp "$f" godot/bin/
          done
          ls -la godot/bin/

      - name: Import project
        run: godot --headless --path godot --import

      - name: Export Linux
        run: |
          mkdir -p dist
          godot --headless --path godot --export-release "Linux/X11" "dist/godopty-${VERSION}-linux-x86_64"

      - name: Export Windows
        run: |
          godot --headless --path godot --export-release "Windows Desktop" "dist/godopty-${VERSION}-windows-x86_64.exe"

      - name: Export macOS
        run: |
          godot --headless --path godot --export-release "macOS" "dist/godopty-${VERSION}-macos-arm64.zip"

      - name: Copy GDExtension artifacts for release
        run: |
          mkdir -p dist/gdextension
          find gdext-artifacts -type f \( -name '*.so' -o -name '*.dylib' -o -name '*.dll' \) -exec cp {} dist/gdextension/ \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/godopty-${VERSION}-linux-x86_64
            dist/godopty-${VERSION}-windows-x86_64.exe
            dist/godopty-${VERSION}-macos-arm64.zip
            dist/gdextension/*
          generate_release_notes: true
