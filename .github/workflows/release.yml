name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always
  GDE_BIN: godot/bin

jobs:
  # ── Build GDExtension per platform ───────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build GDExtension (release)
        run: cargo build -p godopty-gdext --release

      - name: Package
        run: |
          mkdir -p release
          cp target/release/libgodopty_gdext.so release/libgodopty_gdext.linux.x86_64.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: godopty-linux-x86_64
          path: release/

  build-macos:
    strategy:
      matrix:
        target:
          - runner: macos-latest
            arch: arm64
          - runner: macos-15-intel
            arch: x86_64
    runs-on: ${{ matrix.target.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build GDExtension (release)
        run: cargo build -p godopty-gdext --release

      - name: Package
        run: |
          mkdir -p release
          cp target/release/libgodopty_gdext.dylib release/libgodopty_gdext.macos.${{ matrix.target.arch }}.dylib

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: godopty-macos-${{ matrix.target.arch }}
          path: release/

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build GDExtension (release)
        run: cargo build -p godopty-gdext --release

      - name: Package
        run: |
          mkdir release
          copy target\release\godopty_gdext.dll release\godopty_gdext.windows.x86_64.dll

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: godopty-windows-x86_64
          path: release/

  # ── Export standalone app + create GitHub Release ─────────────────────
  export-release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4


      - name: Install Godot headless
        run: |
          sudo apt-get update -y && sudo apt-get install -y wget unzip
          wget -q https://github.com/godotengine/godot-builds/releases/download/4.7-stable/Godot_v4.7-stable_linux.x86_64.zip
          unzip Godot_v4.7-stable_linux.x86_64.zip
          chmod +x Godot_v4.7-stable_linux.x86_64
          sudo mv Godot_v4.7-stable_linux.x86_64 /usr/local/bin/godot
      - name: Install Godot export templates
        run: |
          wget -q https://github.com/godotengine/godot-builds/releases/download/4.7-stable/Godot_v4.7-stable_export_templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/4.7.stable
          mkdir -p /tmp/godot-templates
          unzip -qo Godot_v4.7-stable_export_templates.tpz -d /tmp/godot-templates
          # Handle both structures: with or without a templates/ subdirectory
          if [ -d /tmp/godot-templates/templates ]; then
            mv /tmp/godot-templates/templates/* ~/.local/share/godot/export_templates/4.7.stable/
          else
            mv /tmp/godot-templates/* ~/.local/share/godot/export_templates/4.7.stable/
          fi
          # Godot 4.7 requires macOS template extracted from macos.zip
          cd ~/.local/share/godot/export_templates/4.7.stable
          if [ -f macos.zip ]; then
            unzip -qo macos.zip "macos_template.app/Contents/MacOS/*" -d .
            ls -la macos_template.app/Contents/MacOS/
          fi
          ls -la ~/.local/share/godot/export_templates/4.7.stable/
      - name: Download GDExtension artifacts
        uses: actions/download-artifact@v4
        with:
          path: gdext-artifacts

      - name: Stage GDExtension binaries into godot/bin/
        run: |
          mkdir -p godot/bin
          find gdext-artifacts -type f \( -name '*.so' -o -name '*.dylib' -o -name '*.dll' \) | while read f; do
            cp "$f" godot/bin/
          done

      - name: Import project
        run: godot --headless --path godot --import

      - name: Export Linux
        run: |
          mkdir -p "$GITHUB_WORKSPACE/dist/godopty-${VERSION}-linux-x86_64"
          godot --headless --path godot --export-release "Linux/X11" "$GITHUB_WORKSPACE/dist/godopty-${VERSION}-linux-x86_64/godopty"
          tar -czf "$GITHUB_WORKSPACE/dist/godopty-${VERSION}-linux-x86_64.tar.gz" -C "$GITHUB_WORKSPACE/dist" "godopty-${VERSION}-linux-x86_64"
      - name: Export Windows
        run: |
          godot --headless --path godot --export-release "Windows Desktop" "$GITHUB_WORKSPACE/dist/godopty-${VERSION}-windows-x86_64.exe"
      - name: Export macOS
        run: |
          godot --headless --path godot --export-release "macOS" "$GITHUB_WORKSPACE/dist/godopty-${VERSION}-macos.zip"

      - name: Copy GDExtension artifacts for release
        run: |
          mkdir -p "$GITHUB_WORKSPACE/dist/gdextension"
          find gdext-artifacts -type f \( -name '*.so' -o -name '*.dylib' -o -name '*.dll' \) -exec cp {} "$GITHUB_WORKSPACE/dist/gdextension/" \;
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/godopty-${{ github.ref_name }}-linux-x86_64.tar.gz
            dist/godopty-${{ github.ref_name }}-windows-x86_64.exe
            dist/godopty-${{ github.ref_name }}-macos.zip
            dist/gdextension/*
          generate_release_notes: true
